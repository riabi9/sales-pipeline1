<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#185FA5">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sales Pipeline</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --bg: #f5f5f3; --surface: #fff; --surface2: #ebebea;
  --border: #e5e5e3; --border2: #d0d0cc;
  --text: #1a1a1a; --text2: #555; --text3: #888; --text4: #bbb;
  --blue: #185FA5; --blue-bg: #E6F1FB; --blue-light: #B5D4F4;
  --green: #1D9E75; --green-bg: #E1F5EE;
  --red: #E24B4A; --red-bg: #FCEBEB; --red-text: #A32D2D;
  --amber: #EF9F27; --amber-bg: #FAEEDA; --amber-text: #854F0B;
  --purple-bg: #EEEDFE; --purple-text: #534AB7;
  --card-stale: #fff8f0;
  --stale-border: #f0997b;
}
[data-theme="dark"] {
  --bg: #111110; --surface: #1c1c1a; --surface2: #252523;
  --border: #2e2e2c; --border2: #3a3a38;
  --text: #f0f0ee; --text2: #c0c0bc; --text3: #888; --text4: #555;
  --blue: #378ADD; --blue-bg: #0C2A45; --blue-light: #185FA5;
  --green: #1D9E75; --green-bg: #0a2e22;
  --red: #E24B4A; --red-bg: #2e0f0f; --red-text: #f09595;
  --amber: #EF9F27; --amber-bg: #2e1f05; --amber-text: #FAC775;
  --purple-bg: #1e1b3a; --purple-text: #AFA9EC;
  --card-stale: #1e1508;
  --stale-border: #D85A30;
}
*{box-sizing:border-box;margin:0;padding:0;transition:background-color 0.2s,border-color 0.2s,color 0.15s}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Auth ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:var(--bg)}
.auth-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:28px;width:100%;max-width:360px}
.auth-logo{font-size:20px;font-weight:700;color:var(--blue);margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--text3);margin-bottom:22px}
.auth-tabs{display:flex;margin-bottom:20px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.auth-tab{flex:1;height:36px;border:none;background:var(--surface2);font-size:13px;cursor:pointer;color:var(--text3);font-family:inherit}
.auth-tab.active{background:var(--blue);color:#fff;font-weight:600}
.form-row{margin-bottom:11px}
.form-label{font-size:12px;color:var(--text3);margin-bottom:3px;display:block}
.form-input{width:100%;height:38px;border:1px solid var(--border2);border-radius:8px;padding:0 11px;font-size:14px;background:var(--surface);color:var(--text);font-family:inherit;outline:none}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-bg)}
.auth-btn{width:100%;height:40px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
.auth-btn-primary{background:var(--blue);color:#fff}
.auth-btn-primary:hover{opacity:0.9}
.auth-btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.auth-msg{font-size:12px;text-align:center;margin-top:10px;padding:8px;border-radius:6px}
.auth-msg.error{background:var(--red-bg);color:var(--red-text)}
.auth-msg.success{background:var(--green-bg);color:var(--green)}

/* ── App ── */
#app{display:none}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 12px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:8px}
.app-title{font-size:15px;font-weight:700;color:var(--blue);white-space:nowrap}
.header-right{display:flex;align-items:center;gap:5px;flex-wrap:nowrap;overflow-x:auto}
.user-badge{font-size:11px;color:var(--text3);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:none}
@media(min-width:600px){.user-badge{display:block}}
.admin-badge{font-size:10px;font-weight:700;background:var(--amber-bg);color:var(--amber-text);padding:2px 6px;border-radius:20px;white-space:nowrap}
.hbtn{height:30px;padding:0 10px;border:1px solid var(--border2);border-radius:7px;font-size:12px;background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;white-space:nowrap}
.hbtn:hover{background:var(--surface2)}
.hbtn.active,.hbtn-blue{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.hbtn.active:hover,.hbtn-blue:hover{background:var(--blue-light);color:#fff}
.hbtn-icon{width:30px;padding:0;font-size:15px}
main{padding:12px;max-width:1400px;margin:0 auto}

/* ── Chart ── */
.chart-panel{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:14px;display:none}
.chart-panel.visible{display:block}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.chart-title{font-size:13px;font-weight:600;color:var(--text)}
.chart-toggle{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden}
.ctbtn{height:28px;padding:0 10px;border:none;background:var(--surface2);font-size:12px;cursor:pointer;font-family:inherit;color:var(--text3)}
.ctbtn.active{background:var(--blue);color:#fff;font-weight:600}
.chart-wrap{position:relative;height:200px}

/* ── Toolbar ── */
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-input,.filter-select{height:34px;border:1px solid var(--border2);border-radius:8px;padding:0 10px;font-size:13px;background:var(--surface);color:var(--text);outline:none;font-family:inherit}
.search-input{flex:1;min-width:120px}
.search-input:focus,.filter-select:focus{border-color:var(--blue)}

/* ── Stats ── */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(0,1fr));gap:8px;margin-bottom:14px}
.stat-card{background:var(--surface);border-radius:10px;border:1px solid var(--border);padding:10px 12px}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px}
.stat-value{font-size:18px;font-weight:700;color:var(--text)}
.stat-sub{font-size:10px;color:var(--text4);margin-top:2px}

/* ── Board ── */
.board{display:flex;gap:9px;overflow-x:auto;padding-bottom:12px;align-items:flex-start}
.board::-webkit-scrollbar{height:4px}
.board::-webkit-scrollbar-track{background:var(--surface2);border-radius:4px}
.board::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.column{min-width:200px;flex:1;background:var(--surface2);border-radius:11px;border:1px solid var(--border);padding:9px}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.col-dot{width:8px;height:8px;border-radius:50%;margin-right:5px;flex-shrink:0;display:inline-block}
.col-title{font-size:11px;font-weight:600;color:var(--text2);display:flex;align-items:center}
.col-count{font-size:10px;color:var(--text3);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1px 6px}
.col-total{font-size:10px;color:var(--text4);margin-bottom:7px}

/* ── Cards ── */
.lead-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px;margin-bottom:6px;cursor:pointer}
.lead-card:hover{border-color:var(--border2)}
.lead-card.stale{background:var(--card-stale);border-color:var(--stale-border)}
.stale-row{display:flex;align-items:center;gap:4px;margin-bottom:5px;font-size:10px;color:var(--amber-text)}
.team-tag{font-size:9px;font-weight:600;background:var(--blue-bg);color:var(--blue);padding:2px 5px;border-radius:4px;margin-bottom:5px;display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lead-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:1px}
.lead-company{font-size:11px;color:var(--text3);margin-bottom:5px}
.contact-row{display:flex;flex-direction:column;gap:2px;margin-bottom:5px}
.contact-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}
.cicon{width:11px;height:11px;flex-shrink:0;opacity:0.4}
.products-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}
.product-pill{font-size:10px;background:var(--purple-bg);color:var(--purple-text);padding:2px 6px;border-radius:4px;font-weight:500;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis}
.offer-pill{font-size:10px;background:var(--green-bg);color:var(--green);padding:2px 6px;border-radius:4px;font-weight:600}
.lead-meta{display:flex;align-items:center;justify-content:space-between;gap:4px}
.lead-value{font-size:12px;font-weight:600;color:var(--text)}
.badge{font-size:9px;padding:2px 6px;border-radius:20px;font-weight:600}
.badge-hot{background:#FAECE7;color:#993C1D}
.badge-warm{background:#FAEEDA;color:#854F0B}
.badge-cold{background:var(--blue-bg);color:var(--blue)}
.lead-footer{display:flex;align-items:center;justify-content:space-between;margin-top:5px;gap:4px}
.lead-owner{font-size:10px;color:var(--text4)}
.dl{font-size:10px;padding:2px 5px;border-radius:4px;font-weight:600}
.dl-ok{color:#0F6E56;background:var(--green-bg)}
.dl-soon{color:var(--amber-text);background:var(--amber-bg)}
.dl-overdue{color:var(--red-text);background:var(--red-bg)}
.dl-none{color:var(--text4)}
.won-col .lead-card{border-left:3px solid var(--green)}
.lost-col .lead-card{border-left:3px solid var(--red)}
.loading{text-align:center;padding:40px;color:var(--text3);font-size:14px}

/* ── Modal ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}
@media(min-width:600px){.modal-backdrop{align-items:center;padding:16px}}
.modal{background:var(--surface);border-radius:16px 16px 0 0;border:1px solid var(--border);padding:20px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:14px}}
.modal-drag{width:40px;height:4px;background:var(--border2);border-radius:4px;margin:0 auto 16px;display:block}
@media(min-width:600px){.modal-drag{display:none}}
.modal-title{font-size:16px;font-weight:600;margin-bottom:14px;color:var(--text)}
.fsec{font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:0.5px;margin:14px 0 8px;padding-top:12px;border-top:1px solid var(--border)}
.fsec:first-of-type{border-top:none;padding-top:0;margin-top:0}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.modal .form-input{height:34px;font-size:13px}
textarea.form-input{height:68px;padding:8px 11px;resize:vertical;line-height:1.5}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;align-items:center;flex-wrap:wrap}
.btn-cancel{height:34px;padding:0 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.btn-save{height:34px;padding:0 16px;border:none;border-radius:8px;font-size:13px;background:var(--blue);color:#fff;cursor:pointer;font-weight:600;font-family:inherit}
.btn-save:disabled{opacity:0.5;cursor:not-allowed}
.btn-delete{height:34px;padding:0 14px;border:1px solid var(--red);border-radius:8px;font-size:13px;background:var(--red-bg);color:var(--red-text);cursor:pointer;margin-right:auto;font-family:inherit}

/* ── Multi-product ── */
.product-list{display:flex;flex-direction:column;gap:7px;margin-bottom:8px}
.product-entry{display:grid;grid-template-columns:1fr 60px 90px 28px;gap:5px;align-items:center}
.product-entry input{height:32px;font-size:12px}
.btn-remove-prod{width:28px;height:28px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-remove-prod:hover{background:var(--red-bg);color:var(--red-text);border-color:var(--red)}
.btn-add-product{height:30px;padding:0 10px;border:1px dashed var(--border2);border-radius:7px;font-size:12px;background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;width:100%;margin-top:2px}
.btn-add-product:hover{background:var(--surface2);color:var(--text)}

/* ── Notes/Timeline ── */
.notes-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;max-height:160px;overflow-y:auto}
.note-entry{background:var(--surface2);border-radius:7px;padding:8px 10px;border:1px solid var(--border)}
.note-ts{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:600}
.note-text{font-size:12px;color:var(--text2);line-height:1.5;white-space:pre-wrap}
.notes-input-row{display:flex;gap:6px;align-items:flex-start}
.notes-input-row textarea{flex:1;height:56px;min-height:42px}
.btn-add-note{height:34px;padding:0 12px;border:1px solid var(--blue);border-radius:7px;font-size:12px;background:var(--blue-bg);color:var(--blue);cursor:pointer;font-family:inherit;white-space:nowrap;align-self:flex-start}
.btn-add-note:hover{background:var(--blue);color:#fff}
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-wrap" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">Sales Pipeline</div>
    <div class="auth-sub">Sign in to access your pipeline</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign in</button>
      <button class="auth-tab" onclick="switchTab('register')">Create account</button>
    </div>
    <div id="loginForm">
      <div class="form-row"><label class="form-label">Email</label><input class="form-input" type="email" id="loginEmail" placeholder="you@company.com"></div>
      <div class="form-row"><label class="form-label">Password</label><input class="form-input" type="password" id="loginPassword" placeholder="••••••••"></div>
      <button class="auth-btn auth-btn-primary" onclick="doLogin()" id="loginBtn">Sign in</button>
    </div>
    <div id="registerForm" style="display:none">
      <div class="form-row"><label class="form-label">Full name</label><input class="form-input" type="text" id="regName" placeholder="Your name"></div>
      <div class="form-row"><label class="form-label">Email</label><input class="form-input" type="email" id="regEmail" placeholder="you@company.com"></div>
      <div class="form-row"><label class="form-label">Password</label><input class="form-input" type="password" id="regPassword" placeholder="Min. 6 characters"></div>
      <button class="auth-btn auth-btn-primary" onclick="doRegister()" id="registerBtn">Create account</button>
    </div>
    <div id="authMsg" style="display:none" class="auth-msg"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <span class="app-title">Sales Pipeline</span>
    <div class="header-right">
      <span class="user-badge" id="userEmail"></span>
      <span class="admin-badge" id="adminBadge" style="display:none">Admin</span>
      <button class="hbtn" id="teamViewBtn" style="display:none" onclick="toggleTeamView()">Team</button>
      <button class="hbtn" id="chartBtn" onclick="toggleChart()">Chart</button>
      <button class="hbtn hbtn-blue" onclick="openAdd()">+ Add</button>
      <button class="hbtn" onclick="exportCSV()">CSV</button>
      <button class="hbtn hbtn-icon" id="darkBtn" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
      <button class="hbtn" onclick="doLogout()">Sign out</button>
    </div>
  </header>
  <main>
    <div class="chart-panel" id="chartPanel">
      <div class="chart-header">
        <span class="chart-title">Pipeline overview</span>
        <div class="chart-toggle">
          <button class="ctbtn active" id="ccBtn" onclick="setChartMode('count')">Count</button>
          <button class="ctbtn" id="cvBtn" onclick="setChartMode('value')">Value</button>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="pipelineChart"></canvas></div>
    </div>
    <div class="top-bar">
      <input class="search-input" id="searchInput" placeholder="Search contact, company, product..." oninput="renderBoard()">
      <select class="filter-select" id="priorityFilter" onchange="renderBoard()">
        <option value="">All priorities</option>
        <option value="hot">Hot</option>
        <option value="warm">Warm</option>
        <option value="cold">Cold</option>
      </select>
      <select class="filter-select" id="ownerFilter" onchange="renderBoard()">
        <option value="">All owners</option>
      </select>
    </div>
    <div class="stats-bar" id="statsBar"></div>
    <div id="boardWrap"><div class="loading">Loading your pipeline...</div></div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal" style="display:none">
  <div class="modal">
    <span class="modal-drag"></span>
    <p class="modal-title" id="modalTitle">Add lead</p>

    <div class="fsec">Contact info</div>
    <div class="form-row"><label class="form-label">Contact name</label><input class="form-input" id="fName"></div>
    <div class="form-row"><label class="form-label">Company</label><input class="form-input" id="fCompany"></div>
    <div class="fr2">
      <div class="form-row"><label class="form-label">Email</label><input class="form-input" type="email" id="fEmail" placeholder="contact@company.com"></div>
      <div class="form-row"><label class="form-label">Phone</label><input class="form-input" type="tel" id="fPhone" placeholder="+1 555 000 0000"></div>
    </div>

    <div class="fsec">Products / Services</div>
    <div class="product-list" id="productList"></div>
    <button class="btn-add-product" onclick="addProductRow()">+ Add product</button>

    <div class="fsec">Deal info</div>
    <div class="form-row"><label class="form-label">Deal value ($)</label><input class="form-input" type="number" id="fValue"></div>
    <div class="fr2">
      <div class="form-row"><label class="form-label">Stage</label>
        <select class="form-input" id="fStage">
          <option>Lead / Prospect</option><option>Contacted</option><option>Proposal Sent</option>
          <option>Negotiation</option><option>Closed Won</option><option>Closed Lost</option>
        </select>
      </div>
      <div class="form-row"><label class="form-label">Priority</label>
        <select class="form-input" id="fPriority">
          <option value="hot">Hot</option><option value="warm">Warm</option><option value="cold">Cold</option>
        </select>
      </div>
    </div>
    <div class="fr2">
      <div class="form-row"><label class="form-label">Owner</label><input class="form-input" id="fOwner"></div>
      <div class="form-row"><label class="form-label">Close deadline</label><input class="form-input" type="date" id="fDeadline"></div>
    </div>

    <div class="fsec">Activity timeline</div>
    <div class="notes-list" id="notesList"></div>
    <div class="notes-input-row">
      <textarea class="form-input" id="newNoteInput" placeholder="Add a note or activity..."></textarea>
      <button class="btn-add-note" onclick="addNote()">+ Note</button>
    </div>

    <div class="modal-actions">
      <button class="btn-delete" id="deleteBtn" style="display:none" onclick="deleteLead()">Delete</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="saveLead()">Save</button>
    </div>
  </div>
</div>

<script>
// ══ CONFIG ══
const SUPABASE_URL = 'https://fmmfofjkebdsrnkchrfo.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_WQDKUjUAKV1da7raU1W68A_5PwnKXxS';
// ════════════

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const STAGES = [
  {id:'Lead / Prospect', color:'#378ADD'},
  {id:'Contacted',       color:'#EF9F27'},
  {id:'Proposal Sent',   color:'#7F77DD'},
  {id:'Negotiation',     color:'#D85A30'},
  {id:'Closed Won',      color:'#1D9E75'},
  {id:'Closed Lost',     color:'#E24B4A'},
];

const STALE_DAYS = 5;

let leads=[], editingId=null, currentUser=null;
let isAdmin=false, teamView=false, chartMode='count', chartInstance=null;
let notesArr=[], productsArr=[];

// ── Dark mode ──
function toggleDark(){
  const t = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('darkBtn').textContent = t==='dark'?'☀️':'🌙';
  localStorage.setItem('theme',t);
  if(chartInstance) renderChart();
}
(function initTheme(){
  const saved = localStorage.getItem('theme')||'light';
  document.documentElement.setAttribute('data-theme',saved);
  if(saved==='dark') setTimeout(()=>{ document.getElementById('darkBtn').textContent='☀️'; },0);
})();

// ── Notifications ──
async function requestNotifications(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='default') await Notification.requestPermission();
}
function fireDeadlineNotifications(leads){
  if(Notification.permission!=='granted') return;
  const today=new Date(); today.setHours(0,0,0,0);
  leads.filter(l=>l.deadline&&l.stage!=='Closed Won'&&l.stage!=='Closed Lost').forEach(l=>{
    const d=new Date(l.deadline+'T00:00:00');
    if(d.getTime()===today.getTime()){
      new Notification('Deadline today: '+l.name, {
        body: l.company+' — '+l.stage+' — $'+Number(l.value).toLocaleString(),
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23185FA5"/><text y="68" x="50" text-anchor="middle" font-size="55" fill="white">📊</text></svg>'
      });
    }
  });
}

// ── Auth ──
function switchTab(tab){
  document.getElementById('loginForm').style.display=tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display=tab==='register'?'block':'none';
  document.querySelectorAll('.auth-tab').forEach((b,i)=>b.classList.toggle('active',(tab==='login'&&i===0)||(tab==='register'&&i===1)));
  hideMsg();
}
function showMsg(m,t){const e=document.getElementById('authMsg');e.textContent=m;e.className='auth-msg '+(t||'error');e.style.display='block';}
function hideMsg(){document.getElementById('authMsg').style.display='none';}

async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPassword').value;
  if(!email||!pass) return showMsg('Please fill in all fields.');
  const btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent='Signing in...';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  btn.disabled=false;btn.textContent='Sign in';
  if(error) return showMsg(error.message);
  onSignedIn(data.user);
}

async function doRegister(){
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const pass=document.getElementById('regPassword').value;
  if(!name||!email||!pass) return showMsg('Please fill in all fields.');
  if(pass.length<6) return showMsg('Password must be at least 6 characters.');
  const btn=document.getElementById('registerBtn');btn.disabled=true;btn.textContent='Creating...';
  const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
  btn.disabled=false;btn.textContent='Create account';
  if(error) return showMsg(error.message);
  if(data.session){onSignedIn(data.user);}
  else showMsg('Account created! Check your email to confirm, then sign in.','success');
}

async function doLogout(){
  await sb.auth.signOut();
  currentUser=null;isAdmin=false;teamView=false;leads=[];
  document.getElementById('app').style.display='none';
  document.getElementById('authScreen').style.display='flex';
}

async function onSignedIn(user){
  currentUser=user;
  document.getElementById('authScreen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('userEmail').textContent=user.email;
  const {data:profile}=await sb.from('profiles').select('is_admin').eq('id',user.id).single();
  isAdmin=profile?.is_admin||false;
  if(isAdmin){
    document.getElementById('adminBadge').style.display='inline-block';
    document.getElementById('teamViewBtn').style.display='inline-block';
  }
  await requestNotifications();
  loadLeads();
}

sb.auth.getSession().then(({data:{session}})=>{if(session) onSignedIn(session.user);});

// ── Data ──
async function loadLeads(){
  document.getElementById('boardWrap').innerHTML='<div class="loading">Loading...</div>';
  const q=sb.from('leads').select('*').order('created_at',{ascending:true});
  if(!teamView) q.eq('user_id',currentUser.id);
  const {data,error}=await q;
  if(error){document.getElementById('boardWrap').innerHTML='<div class="loading">Error: '+error.message+'</div>';return;}
  leads=data||[];
  fireDeadlineNotifications(leads);
  renderBoard();
  if(document.getElementById('chartPanel').classList.contains('visible')) renderChart();
}

async function saveLead(){
  const btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='Saving...';
  const prods=getProductsFromForm();
  const obj={
    name:document.getElementById('fName').value.trim()||'Unnamed',
    company:document.getElementById('fCompany').value.trim()||'—',
    email:document.getElementById('fEmail').value.trim(),
    phone:document.getElementById('fPhone').value.trim(),
    products:prods,
    value:Number(document.getElementById('fValue').value)||0,
    stage:document.getElementById('fStage').value,
    priority:document.getElementById('fPriority').value,
    owner:document.getElementById('fOwner').value.trim()||'—',
    deadline:document.getElementById('fDeadline').value||null,
    notes:JSON.stringify(notesArr),
    user_id:currentUser.id,
    user_email:currentUser.email,
  };
  let error;
  if(editingId){({error}=await sb.from('leads').update(obj).eq('id',editingId));}
  else{({error}=await sb.from('leads').insert(obj));}
  btn.disabled=false;btn.textContent='Save';
  if(error){alert('Save failed: '+error.message);return;}
  closeModal();loadLeads();
}

async function deleteLead(){
  if(!confirm('Delete this lead?')) return;
  const {error}=await sb.from('leads').delete().eq('id',editingId);
  if(error){alert('Delete failed: '+error.message);return;}
  closeModal();loadLeads();
}

function toggleTeamView(){
  teamView=!teamView;
  const btn=document.getElementById('teamViewBtn');
  btn.classList.toggle('active',teamView);
  btn.textContent=teamView?'My leads':'Team';
  loadLeads();
}

// ── Chart ──
function toggleChart(){
  const panel=document.getElementById('chartPanel');
  const visible=panel.classList.toggle('visible');
  document.getElementById('chartBtn').classList.toggle('active',visible);
  if(visible) renderChart();
}
function setChartMode(m){
  chartMode=m;
  document.getElementById('ccBtn').classList.toggle('active',m==='count');
  document.getElementById('cvBtn').classList.toggle('active',m==='value');
  renderChart();
}
function renderChart(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const gridColor=isDark?'#2e2e2c':'#f0f0ee';
  const tickColor=isDark?'#888':'#888';
  const data=STAGES.map(s=>{
    const col=leads.filter(l=>l.stage===s.id);
    return chartMode==='count'?col.length:col.reduce((sum,l)=>sum+Number(l.value),0);
  });
  const ctx=document.getElementById('pipelineChart').getContext('2d');
  if(chartInstance) chartInstance.destroy();
  chartInstance=new Chart(ctx,{
    type:'bar',
    data:{labels:STAGES.map(s=>s.id.split(' ')[0]),datasets:[{data,backgroundColor:STAGES.map(s=>s.color),borderRadius:6,borderSkipped:false}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>chartMode==='count'?c.raw+' leads':'$'+Number(c.raw).toLocaleString()}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:10},color:tickColor}},
        y:{grid:{color:gridColor},ticks:{font:{size:10},color:tickColor,callback:v=>chartMode==='count'?v:'$'+Number(v).toLocaleString()}}
      }
    }
  });
}

// ── Render ──
function fmt(n){return'$'+Number(n).toLocaleString();}
function deadlineInfo(dl){
  if(!dl) return{label:'No deadline',cls:'dl-none'};
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(dl+'T00:00:00');
  const diff=Math.round((d-today)/(1000*60*60*24));
  if(diff<0) return{label:'Overdue '+Math.abs(diff)+'d',cls:'dl-overdue'};
  if(diff<=7) return{label:'Due in '+diff+'d',cls:'dl-soon'};
  return{label:d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}),cls:'dl-ok'};
}
function isStale(l){
  if(l.stage==='Closed Won'||l.stage==='Closed Lost') return false;
  const ref=l.updated_at||l.created_at;
  if(!ref) return false;
  const days=(Date.now()-new Date(ref))/(1000*60*60*24);
  return days>STALE_DAYS;
}
function getOwners(){return[...new Set(leads.map(l=>l.owner).filter(Boolean))].sort();}
function populateOwnerFilter(){
  const sel=document.getElementById('ownerFilter');const cur=sel.value;
  sel.innerHTML='<option value="">All owners</option>';
  getOwners().forEach(o=>{const op=document.createElement('option');op.value=o;op.textContent=o;if(o===cur)op.selected=true;sel.appendChild(op);});
}
function filtered(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const p=document.getElementById('priorityFilter').value;
  const o=document.getElementById('ownerFilter').value;
  return leads.filter(l=>{
    const prods=(l.products||[]).map(p=>p.name||'').join(' ').toLowerCase();
    const mq=!q||l.name.toLowerCase().includes(q)||l.company.toLowerCase().includes(q)||(l.email&&l.email.toLowerCase().includes(q))||prods.includes(q);
    return mq&&(!p||l.priority===p)&&(!o||l.owner===o);
  });
}
function renderStats(){
  const active=leads.filter(l=>l.stage!=='Closed Won'&&l.stage!=='Closed Lost');
  const won=leads.filter(l=>l.stage==='Closed Won');
  const wonTotal=won.reduce((s,l)=>s+Number(l.value),0);
  const pipe=active.reduce((s,l)=>s+Number(l.value),0);
  const rate=leads.length?Math.round(won.length/leads.length*100):0;
  const today=new Date();today.setHours(0,0,0,0);
  const overdue=active.filter(l=>l.deadline&&new Date(l.deadline+'T00:00:00')<today).length;
  const staleCount=leads.filter(isStale).length;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${leads.length}</div><div class="stat-sub">${active.length} active</div></div>
    <div class="stat-card"><div class="stat-label">Pipeline</div><div class="stat-value">${fmt(pipe)}</div><div class="stat-sub">active deals</div></div>
    <div class="stat-card"><div class="stat-label">Closed</div><div class="stat-value">${fmt(wonTotal)}</div><div class="stat-sub">${won.length} won</div></div>
    <div class="stat-card"><div class="stat-label">Win rate</div><div class="stat-value">${rate}%</div><div class="stat-sub">of all leads</div></div>
    <div class="stat-card"><div class="stat-label">Overdue</div><div class="stat-value" style="color:${overdue>0?'var(--red)':'var(--text)'}">${overdue}</div><div class="stat-sub">past deadline</div></div>
    <div class="stat-card"><div class="stat-label">Stale</div><div class="stat-value" style="color:${staleCount>0?'var(--amber)':'var(--text)'}">${staleCount}</div><div class="stat-sub">${STALE_DAYS}+ days idle</div></div>
  `;
}
function emailIcon(){return`<svg class="cicon" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M1 5l7 5 7-5" stroke="currentColor" stroke-width="1.3"/></svg>`}
function phoneIcon(){return`<svg class="cicon" viewBox="0 0 16 16" fill="none"><path d="M3 2h3l1.5 3.5L6 7a9 9 0 003 3l1.5-1.5L14 10v3a1 1 0 01-1 1A11 11 0 012 3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>`}

function renderBoard(){
  populateOwnerFilter();renderStats();
  const fl=filtered();
  let html='<div class="board">';
  STAGES.forEach(st=>{
    const cols=fl.filter(l=>l.stage===st.id);
    const stTotal=cols.reduce((s,l)=>s+Number(l.value),0);
    const isWon=st.id==='Closed Won',isLost=st.id==='Closed Lost';
    html+=`<div class="column${isWon?' won-col':isLost?' lost-col':''}">
      <div class="col-header">
        <span class="col-title"><span class="col-dot" style="background:${st.color}"></span>${st.id}</span>
        <span class="col-count">${cols.length}</span>
      </div>
      <div class="col-total">${fmt(stTotal)}</div>
      ${cols.map(l=>{
        const di=deadlineInfo(l.deadline);
        const stale=isStale(l);
        const prods=Array.isArray(l.products)?l.products:[];
        return`<div class="lead-card${stale?' stale':''}" onclick="openEdit('${l.id}')">
          ${stale?`<div class="stale-row">⏳ Idle ${STALE_DAYS}+ days</div>`:''}
          ${teamView&&l.user_email?`<div class="team-tag">${l.user_email}</div>`:''}
          <div class="lead-name">${l.name}</div>
          <div class="lead-company">${l.company}</div>
          <div class="contact-row">
            ${l.email?`<div class="contact-item">${emailIcon()}<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:155px">${l.email}</span></div>`:''}
            ${l.phone?`<div class="contact-item">${phoneIcon()}<span>${l.phone}</span></div>`:''}
          </div>
          ${prods.length?`<div class="products-row">${prods.slice(0,3).map(p=>`<span class="product-pill">${p.name||''}${p.qty?' ×'+p.qty:''}${p.measure?' '+p.measure:''}</span>`).join('')}${prods.length>3?`<span class="product-pill">+${prods.length-3}</span>`:''}</div>`:''}
          <div class="lead-meta"><span class="lead-value">${fmt(l.value)}</span><span class="badge badge-${l.priority}">${l.priority.charAt(0).toUpperCase()+l.priority.slice(1)}</span></div>
          <div class="lead-footer"><span class="lead-owner">${l.owner||'—'}</span><span class="dl ${di.cls}">${di.label}</span></div>
        </div>`;
      }).join('')}
    </div>`;
  });
  html+='</div>';
  document.getElementById('boardWrap').innerHTML=html;
}

// ── Multi-product ──
function addProductRow(p){
  const list=document.getElementById('productList');
  const idx=list.children.length;
  const div=document.createElement('div');
  div.className='product-entry';
  div.innerHTML=`
    <input class="form-input prod-name" placeholder="Product / service" value="${p?.name||''}">
    <input class="form-input prod-qty" type="number" placeholder="Qty" min="0" value="${p?.qty||''}">
    <input class="form-input prod-measure" placeholder="Unit / size" value="${p?.measure||''}">
    <button class="btn-remove-prod" onclick="this.parentElement.remove()">×</button>
  `;
  list.appendChild(div);
}
function getProductsFromForm(){
  return [...document.getElementById('productList').children].map(row=>({
    name:row.querySelector('.prod-name').value.trim(),
    qty:row.querySelector('.prod-qty').value.trim(),
    measure:row.querySelector('.prod-measure').value.trim(),
  })).filter(p=>p.name);
}

// ── Notes ──
function renderNotesList(){
  document.getElementById('notesList').innerHTML=notesArr.length
    ?notesArr.map(n=>`<div class="note-entry"><div class="note-ts">${n.ts}</div><div class="note-text">${n.text}</div></div>`).join('')
    :'<div style="font-size:12px;color:var(--text4);padding:4px 0">No notes yet</div>';
}
function addNote(){
  const input=document.getElementById('newNoteInput');
  const text=input.value.trim();
  if(!text) return;
  const now=new Date();
  const ts=now.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  notesArr.unshift({ts,text});
  renderNotesList();
  input.value='';
}

// ── Modal ──
function openAdd(){
  editingId=null;
  notesArr=[];productsArr=[];
  document.getElementById('modalTitle').textContent='Add lead';
  ['fName','fCompany','fEmail','fPhone','fOwner','fDeadline'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fValue').value='';
  document.getElementById('fStage').value='Lead / Prospect';
  document.getElementById('fPriority').value='warm';
  document.getElementById('productList').innerHTML='';
  document.getElementById('newNoteInput').value='';
  document.getElementById('deleteBtn').style.display='none';
  document.getElementById('saveBtn').textContent='Save';
  renderNotesList();
  document.getElementById('modal').style.display='flex';
}
function openEdit(id){
  const l=leads.find(x=>x.id===id);if(!l)return;
  editingId=id;
  notesArr=[];
  try{notesArr=JSON.parse(l.notes||'[]');}catch(e){if(l.notes)notesArr=[{ts:'—',text:l.notes}];}
  document.getElementById('modalTitle').textContent='Edit lead';
  document.getElementById('fName').value=l.name||'';
  document.getElementById('fCompany').value=l.company||'';
  document.getElementById('fEmail').value=l.email||'';
  document.getElementById('fPhone').value=l.phone||'';
  document.getElementById('fValue').value=l.value||'';
  document.getElementById('fStage').value=l.stage;
  document.getElementById('fPriority').value=l.priority;
  document.getElementById('fOwner').value=l.owner||'';
  document.getElementById('fDeadline').value=l.deadline||'';
  document.getElementById('productList').innerHTML='';
  (Array.isArray(l.products)?l.products:[]).forEach(p=>addProductRow(p));
  document.getElementById('newNoteInput').value='';
  document.getElementById('deleteBtn').style.display='block';
  document.getElementById('saveBtn').textContent='Save';
  renderNotesList();
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}

// ── Export ──
function exportCSV(){
  const headers=['Contact','Company','Email','Phone','Products','Deal Value','Stage','Priority','Owner','Deadline',(teamView?'User':'')].filter(Boolean);
  const rows=leads.map(l=>{
    const prods=(Array.isArray(l.products)?l.products:[]).map(p=>[p.name,p.qty,p.measure].filter(Boolean).join(' ')).join(' | ');
    return[`"${l.name}"`,`"${l.company}"`,`"${l.email||''}"`,`"${l.phone||''}"`,`"${prods}"`,l.value,`"${l.stage}"`,l.priority,`"${l.owner||''}"`,l.deadline||'',(teamView?`"${l.user_email||''}"`:null)].filter(v=>v!==null);
  });
  const csv=[headers.join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='sales_pipeline.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
</script>
