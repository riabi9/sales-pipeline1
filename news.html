<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#185FA5">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>News — Steel Platform</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f5f5f3;--surface:#fff;--surface2:#ebebea;--border:#e5e5e3;--border2:#d0d0cc;
  --text:#1a1a1a;--text2:#555;--text3:#888;--text4:#bbb;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-light:#B5D4F4;
  --green:#1D9E75;--green-bg:#E1F5EE;--green-text:#0F6E56;
  --red:#E24B4A;--red-bg:#FCEBEB;--red-text:#A32D2D;
  --amber:#EF9F27;--amber-bg:#FAEEDA;--amber-text:#854F0B;
  --purple:#7F77DD;--purple-bg:#EEEDFE;--purple-text:#534AB7;
  --sidebar-w:200px;
}
[data-theme="dark"]{
  --bg:#111110;--surface:#1c1c1a;--surface2:#252523;--border:#2e2e2c;--border2:#3a3a38;
  --text:#f0f0ee;--text2:#c0c0bc;--text3:#888;--text4:#555;
  --blue:#378ADD;--blue-bg:#0C2A45;--blue-light:#185FA5;
  --green:#1D9E75;--green-bg:#0a2e22;--green-text:#5DCAA5;
  --red:#E24B4A;--red-bg:#2e0f0f;--red-text:#f09595;
  --amber:#EF9F27;--amber-bg:#2e1f05;--amber-text:#FAC775;
  --purple:#AFA9EC;--purple-bg:#1e1b3a;--purple-text:#AFA9EC;
}
*{box-sizing:border-box;margin:0;padding:0;transition:background-color 0.2s,border-color 0.2s,color 0.15s}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Auth */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:var(--bg)}
.auth-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:28px;width:100%;max-width:360px}
.auth-logo{font-size:20px;font-weight:700;color:var(--blue);margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--text3);margin-bottom:22px}
.form-row{margin-bottom:11px}
.form-label{font-size:12px;color:var(--text3);margin-bottom:3px;display:block}
.form-input{width:100%;height:38px;border:1px solid var(--border2);border-radius:8px;padding:0 11px;font-size:13px;background:var(--surface);color:var(--text);font-family:inherit;outline:none}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-bg)}
.auth-btn{width:100%;height:40px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;background:var(--blue);color:#fff}
.auth-btn:hover{opacity:0.9}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed}
.auth-msg{font-size:12px;text-align:center;margin-top:10px;padding:8px;border-radius:6px}
.auth-msg.error{background:var(--red-bg);color:var(--red-text)}

/* App shell */
#app{display:none}
.app-layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:150;transition:transform 0.25s}
.sidebar-logo{padding:16px 14px 12px;border-bottom:1px solid var(--border)}
.sidebar-logo-text{font-size:15px;font-weight:700;color:var(--blue)}
.sidebar-logo-sub{font-size:10px;color:var(--text4);margin-top:1px}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:13px;color:var(--text2);text-decoration:none;border-radius:0;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue);font-weight:600}
.nav-item .nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-section{font-size:9px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:0.6px;padding:10px 14px 4px}
.sidebar-footer{padding:10px 14px;border-top:1px solid var(--border)}
.user-info{font-size:11px;color:var(--text3);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.admin-badge{font-size:10px;font-weight:700;background:var(--amber-bg);color:var(--amber-text);padding:2px 6px;border-radius:20px;display:inline-block;margin-bottom:6px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:140}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main-content{margin-left:0!important}
}
.main-content{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:8px}
.topbar-left{display:flex;align-items:center;gap:10px}
.menu-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:7px;background:var(--surface2);color:var(--text);cursor:pointer;font-size:16px;display:none;align-items:center;justify-content:center}
@media(max-width:768px){.menu-btn{display:flex}}
.page-title{font-size:15px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:6px}
.hbtn{height:30px;padding:0 10px;border:1px solid var(--border2);border-radius:7px;font-size:12px;background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;white-space:nowrap}
.hbtn:hover{background:var(--surface2)}
.hbtn.active,.hbtn-blue{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.hbtn.active:hover,.hbtn-blue:hover{background:var(--blue-light);color:#fff}
.hbtn-icon{width:30px;padding:0;font-size:15px}
main{padding:12px;max-width:1100px;margin:0 auto;width:100%}

/* News-specific */
.news-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-input{height:34px;border:1px solid var(--border2);border-radius:8px;padding:0 10px;font-size:13px;background:var(--surface);color:var(--text);outline:none;font-family:inherit;flex:1;min-width:160px}
.search-input:focus{border-color:var(--blue)}
.tab-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{height:28px;padding:0 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.15s}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
.tab:hover:not(.active){background:var(--surface2);color:var(--text)}
.status-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.status-txt{font-size:11px;color:var(--text4)}
.count-pill{font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 8px;color:var(--text3)}
.cards-list{display:flex;flex-direction:column;gap:9px}
.news-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:border-color 0.15s}
.news-card:hover{border-color:var(--border2)}
.card-meta{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap}
.cat-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.cat-steel{background:var(--blue-bg);color:var(--blue)}
.cat-politics{background:var(--amber-bg);color:var(--amber-text)}
.cat-both{background:var(--green-bg);color:var(--green-text)}
.card-source{font-size:11px;color:var(--text4)}
.card-date{font-size:11px;color:var(--text4);margin-left:auto}
.card-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:4px}
.card-summary{font-size:12px;color:var(--text3);line-height:1.6}
.empty-state{text-align:center;padding:40px 16px;color:var(--text4);font-size:13px}
.loading-state{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- No auth needed on news page -->

<!-- APP -->
<div id="app" style="display:block">
  <div class="app-layout">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-text">⚙️ Steel Platform</div>
        <div class="sidebar-logo-sub">Export Management Suite</div>
      </div>
        <div class="sidebar-nav">
        <div class="nav-section">Pipeline</div>
        <a class="nav-item" href="index.html"><span class="nav-icon">📊</span>Dashboard</a>
        <a class="nav-item" href="offer.html"><span class="nav-icon">📋</span>Offers</a>
        <div class="nav-section">Documents</div>
        <a class="nav-item" href="documents.html"><span class="nav-icon">📄</span>Invoices &amp; Packing</a>
        <div class="nav-section">Inventory</div>
        <a class="nav-item" href="stock.html"><span class="nav-icon">📦</span>Stock</a>
        <div class="nav-section">Tools</div>
        <a class="nav-item" href="tools.html"><span class="nav-icon">🔧</span>Tools</a>
        <a class="nav-item" href="logistics.html"><span class="nav-icon">🚢</span>Logistics</a>
        <a class="nav-item active" href="news.html"><span class="nav-icon">📰</span>News</a>
        <a class="nav-item" href="converter.html"><span class="nav-icon">⚡</span>Grade Converter</a>
        <a class="nav-item" href="cont.html"><span class="nav-icon">👥</span>Contacts</a>
        <div class="nav-section" id="adminNavSection" style="display:none">Admin</div>
        <a class="nav-item" href="cont.html" id="adminNavLink" style="display:none"><span class="nav-icon">⚙️</span>Admin Panel</a>
        </div>
      <div class="sidebar-footer">
        <button class="hbtn hbtn-icon" id="darkBtn" onclick="toggleDark()" style="width:100%">🌙 Dark mode</button>
      </div>
    </nav>

    <div class="main-content">
      <div class="topbar">
        <div class="topbar-left">
          <button class="menu-btn" onclick="openSidebar()">☰</button>
          <span class="page-title">Industry News</span>
        </div>
        <div class="topbar-right">
          <button class="hbtn" onclick="doRefresh()" id="refreshBtn">↻ Refresh</button>
        </div>
      </div>

      <main>
        <div class="news-toolbar">
          <input class="search-input" id="newsSearch" placeholder="Search headlines, companies, topics..." onkeydown="if(event.key==='Enter')doSearch()">
          <button class="hbtn hbtn-blue" onclick="doSearch()">Search</button>
        </div>

        <div class="tab-row">
          <button class="tab active" onclick="setTab('all',this)">All</button>
          <button class="tab" onclick="setTab('steel',this)">Steel industry</button>
          <button class="tab" onclick="setTab('politics',this)">Politics</button>
          <button class="tab" onclick="setTab('both',this)">Trade &amp; tariffs</button>
        </div>

        <div class="status-row">
          <span class="status-txt" id="statusTxt">Loading latest news...</span>
          <span class="count-pill" id="countPill">0 articles</span>
        </div>

        <div class="cards-list" id="cardsList">
          <div class="loading-state"><span class="spinner"></span>Fetching latest steel &amp; politics news...</div>
        </div>
      </main>
    </div>
  </div>
</div>

<script>
// ── Sidebar / dark mode ──
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}
function toggleDark() {
  const html = document.documentElement;
  const dark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('darkBtn').textContent = dark ? '🌙 Dark mode' : '☀️ Light mode';
  localStorage.setItem('theme', dark ? 'light' : 'dark');
}
(function() {
  const t = localStorage.getItem('theme');
  if (t) {
    document.documentElement.setAttribute('data-theme', t);
    window.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('darkBtn');
      if (btn) btn.textContent = t === 'dark' ? '☀️ Light mode' : '🌙 Dark mode';
    });
  }
})();

// ── RSS Feeds via rss2json.com (free, no key needed) ──
const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';

const FEEDS = [
  { url: 'https://www.steelorbis.com/steel-news/rss/latest-steel-news.rss', cat: 'steel', label: 'SteelOrbis' },
  { url: 'https://www.worldsteel.org/rss/news.xml', cat: 'steel', label: 'World Steel' },
  { url: 'https://feeds.bbci.co.uk/news/business/rss.xml', cat: 'politics', label: 'BBC Business' },
  { url: 'https://feeds.reuters.com/reuters/businessNews', cat: 'politics', label: 'Reuters' },
  { url: 'https://rss.ft.com/rss/companies/metals', cat: 'steel', label: 'FT Metals' },
  { url: 'https://feeds.bbci.co.uk/news/politics/rss.xml', cat: 'politics', label: 'BBC Politics' },
];

const TRADE_KEYWORDS = ['tariff','tariffs','trade war','sanction','import duty','export ban','wto','trade deal','anti-dumping','section 232','steel tariff','protectionism'];
const STEEL_KEYWORDS = ['steel','iron ore','coil','rebar','billet','blast furnace','hrc','crc','galvanized','stainless','metallurgy','scrap metal','pig iron','wire rod','flat steel','long steel'];

let allArticles = [];
let currentTab = 'all';

function classifyArticle(title, desc) {
  const txt = (title + ' ' + desc).toLowerCase();
  const hasTrade = TRADE_KEYWORDS.some(k => txt.includes(k));
  const hasSteel = STEEL_KEYWORDS.some(k => txt.includes(k));
  if (hasTrade) return 'both';
  if (hasSteel) return 'steel';
  return 'politics';
}

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return '';
  const diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
  return d.toLocaleDateString('en-GB', {day:'2-digit', month:'short'});
}

async function fetchFeed(feed) {
  try {
    const res = await fetch(RSS2JSON + encodeURIComponent(feed.url) + '&count=10', { mode: 'cors' });
    if (!res.ok) return [];
    const data = await res.json();
    if (data.status !== 'ok' || !Array.isArray(data.items)) return [];
    return data.items.map(item => ({
      title: item.title || '',
      summary: (item.description || item.content || '').replace(/<[^>]+>/g, '').slice(0, 200).trim() + '...',
      source: feed.label,
      date: timeAgo(item.pubDate),
      url: item.link || '',
      category: classifyArticle(item.title || '', item.description || ''),
      pubDate: new Date(item.pubDate || 0)
    }));
  } catch(e) {
    console.warn('Feed failed:', feed.label, e.message);
    return [];
  }
}

async function loadAllFeeds(searchQuery) {
  document.getElementById('cardsList').innerHTML = '<div class="loading-state"><span class="spinner"></span>Fetching latest news...</div>';
  document.getElementById('statusTxt').textContent = 'Fetching...';
  document.getElementById('refreshBtn').disabled = true;

  const results = await Promise.all(FEEDS.map(fetchFeed));
  let articles = results.flat();

  // Deduplicate
  const seen = new Set();
  articles = articles.filter(a => {
    const key = a.title.slice(0, 50).toLowerCase();
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });

  // Filter by search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    articles = articles.filter(a =>
      a.title.toLowerCase().includes(q) || a.summary.toLowerCase().includes(q)
    );
  }

  articles.sort((a, b) => b.pubDate - a.pubDate);
  allArticles = articles;
  renderCards();

  const count = articles.length;
  document.getElementById('statusTxt').textContent = count > 0
    ? 'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
    : 'No articles loaded — check connection';
  document.getElementById('refreshBtn').disabled = false;
}

function renderCards() {
  let articles = allArticles;
  if (currentTab !== 'all') {
    articles = articles.filter(a =>
      currentTab === 'both' ? a.category === 'both' : (a.category === currentTab || a.category === 'both')
    );
  }
  document.getElementById('countPill').textContent = articles.length + ' article' + (articles.length !== 1 ? 's' : '');
  if (!articles.length) {
    document.getElementById('cardsList').innerHTML = '<div class="empty-state">No articles found. Try refreshing or a different search.</div>';
    return;
  }
  document.getElementById('cardsList').innerHTML = articles.map(a => `
    <div class="news-card" onclick="window.open('${a.url}', '_blank')">
      <div class="card-meta">
        <span class="cat-badge ${a.category === 'steel' ? 'cat-steel' : a.category === 'politics' ? 'cat-politics' : 'cat-both'}">${a.category === 'both' ? 'Trade & tariffs' : a.category === 'steel' ? 'Steel' : 'Politics'}</span>
        <span class="card-source">${a.source}</span>
        <span class="card-date">${a.date}</span>
      </div>
      <div class="card-title">${a.title}</div>
      <div class="card-summary">${a.summary}</div>
    </div>
  `).join('');
}

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

function doSearch() {
  const q = document.getElementById('newsSearch').value.trim();
  loadAllFeeds(q || null);
}

function doRefresh() {
  const q = document.getElementById('newsSearch').value.trim();
  loadAllFeeds(q || null);
}

document.addEventListener('DOMContentLoaded', () => loadAllFeeds());
</script>
</body>
</html>
